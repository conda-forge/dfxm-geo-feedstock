schema_version: 1

context:
  name: dfxm-geo
  version: "3.0.0"
  python_min: "3.11"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/dfxm_geo-${{ version }}.tar.gz
  sha256: 8a5a3e130b5d78b39f6acf3e69540944a9515221abe866d3fb8b2a1af94ec70b

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  python:
    # All SEVEN console scripts must be declared so rattler-build generates
    # working OS launchers (a missing one yields a broken Windows .exe).
    entry_points:
      - dfxm-forward = dfxm_geo.pipeline:cli_main
      - dfxm-identify = dfxm_geo.pipeline:cli_main_identify
      - dfxm-bootstrap = dfxm_geo.reciprocal_space.kernel:cli_main
      - dfxm-find-reflections = dfxm_geo.find_reflections_cmd:cli_main
      - dfxm-init = dfxm_geo.init_cmd:cli_main
      - dfxm-migrate-output = dfxm_geo.io.migrate:cli_main_npy_to_h5
      - dfxm-migrate-h5 = dfxm_geo.io.migrate:cli_main_h5_to_h5

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools >=68
    - wheel
  run:
    - python >=${{ python_min }}
    - numpy >=1.23,<3
    - scipy >=1.10,<2
    - numba >=0.56
    - matplotlib-base >=3.6
    - seaborn-base >=0.12
    - fabio >=2023.4
    - h5py >=3
    - joblib >=1.3
    - tqdm >=4.66.3
  run_constraints:
    # Optional extras — not installed by default, but version-pinned if present.
    # Kept out of `run` so the package stays noarch (gemmi is a compiled dep).
    - gemmi >=0.7        # cif (CIF crystal-structure input)
    - xraylib >=4.1      # beamstop-wire (X-ray attenuation through the wire)
    - psutil >=5         # memory-aware (adaptive parallel worker capping)
    - plotly >=5         # identification (interactive viewers)

tests:
  - python:
      imports:
        - dfxm_geo
        - dfxm_geo.analysis
        - dfxm_geo.crystal
        - dfxm_geo.data
        - dfxm_geo.direct_space
        - dfxm_geo.io
        - dfxm_geo.reciprocal_space
        - dfxm_geo.viz
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"
  - script:
      - dfxm-forward --help
      - dfxm-identify --help
      - dfxm-bootstrap --help
      - dfxm-find-reflections --help
      - dfxm-init --help
    requirements:
      run:
        - python ${{ python_min }}.*

about:
  homepage: https://github.com/borgi-s/Geometrical_Optics_master
  repository: https://github.com/borgi-s/Geometrical_Optics_master
  documentation: https://github.com/borgi-s/Geometrical_Optics_master/tree/main/docs
  license: MIT
  license_file: LICENSE
  summary: Geometrical-optics forward model for dark-field X-ray microscopy
  description: |
    dfxm-geo is a geometrical-optics forward model for dark-field X-ray
    microscopy (DFXM). It simulates DFXM images of crystals containing
    dislocations across FCC, BCC, and HCP structures (or any cell via a CIF
    file), with multi-reflection runs, symmetric and oblique geometry, scan
    trajectories, and a measured uint16-ADU detector model, and writes
    simulation output in a BLISS-compatible HDF5 layout. A companion
    identification mode reconstructs dislocation populations from scans.

    The model is described in Borgi et al., J. Appl. Cryst. 57, 358 (2024).

extra:
  recipe-maintainers:
    - borgi-s
